name: Deplot To Netlify
on:
    push:
        branches:
            - master
jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v3
            - name: Install Dependencies
              run: npm install
            - name: Build Project
              run: npm run build
            - name: Install Netlofy CLI
              run: npm install -g netlify-cli
            - name: Deploy to Netlify
              run: | 
                 netlify deploy \
                 --dir=out \
                 --prod \
                 --site=$NETLIFY_SITE_ID \
                 --site=NETLIFY_AUTH_TOKEN